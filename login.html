                <!-- Login Form -->
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">帳號</label>
                        <input type="text" id="login-username" required placeholder="請輸入帳號">

                    <div class="form-group">
                        <label for="login-password">密碼</label>
                        <input type="password" id="login-password" required placeholder="請輸入密碼">
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">登入</button>
                </form>

                <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: #666;">
                    需要申請會員帳號請聯繫管理員。
